version: 2

project_name: gridlane

builds:
  - id: gridlane
    main: ./cmd/gridlane
    binary: gridlane
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: gridlane
    ids:
      - gridlane
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  disable: true

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  disable: true
